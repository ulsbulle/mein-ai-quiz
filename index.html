<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HF Final Test</title>
</head>
<body>
    <h2>Letzter Versuch: Hugging Face</h2>
    <input type="password" id="token" placeholder="hf_...">
    <button onclick="runTest()">Testen</button>
    <pre id="output" style="background:#eee; padding:10px; margin-top:10px; white-space: pre-wrap;"></pre>

    <script>
        async function runTest() {
            const out = document.getElementById('output');
            const token = document.getElementById('token').value.trim();
            out.innerText = "Sende Anfrage...";

            try {
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3",
                    {
                        headers: {
                            "Authorization": `Bearer ${token}`,
                            "Content-Type": "application/json",
                        },
                        method: "POST",
                        body: JSON.stringify({inputs: "Hallo, wer bist du?"}),
                    }
                );

                const result = await response.json();
                
                if (response.ok) {
                    out.innerText = "ERFOLG: " + JSON.stringify(result[0].generated_text);
                    out.style.color = "green";
                } else {
                    out.innerText = "API FEHLER: " + JSON.stringify(result);
                    out.style.color = "orange";
                }
            } catch (error) {
                out.innerText = "NETZWERK FEHLER: " + error.message + 
                    "\n\nTipp: Prüfe, ob dein Token aktiv ist oder ob du ein VPN/Adblocker nutzt.";
                out.style.color = "red";
            }
        }
    </script>
</body>
</html>
