<!DOCTYPE html>
<html>
<body>
    <h2>Hugging Face Verbindungstest</h2>
    <input type="password" id="t" placeholder="hf_...">
    <button onclick="test()">Test Starten</button>
    <div id="out" style="margin-top:20px; padding:10px; border:1px solid #ccc;">Noch kein Test gestartet.</div>

    <script>
        async function test() {
            const out = document.getElementById('out');
            const token = document.getElementById('t').value.trim();
            out.innerText = "Verbindung wird aufgebaut...";
            
            try {
                const r = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: "Sag Hallo!" })
                });
                
                const data = await r.json();
                if (r.ok) {
                    out.style.color = "green";
                    out.innerText = "ERFOLG! Die KI sagt: " + JSON.stringify(data[0].generated_text);
                } else {
                    out.style.color = "red";
                    out.innerText = "FEHLER: " + (data.error || "Unbekannter Fehler");
                }
            } catch (e) {
                out.style.color = "red";
                out.innerText = "NETZWERK-FEHLER (Failed to fetch): Wahrscheinlich blockiert dein Browser oder Router die Verbindung zu Hugging Face.";
            }
        }
    </script>
</body>
</html>
