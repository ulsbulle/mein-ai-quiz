<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Master Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #progress-bar { transition: width 0.4s ease-in-out; }
        #game-canvas { cursor: crosshair; background: #f8fafc; border-radius: 1rem; border: 2px solid #e2e8f0; }
        .history-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-2xl mx-auto py-10 px-4">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-2">🧠 AI Quiz Master Pro</h1>
            <p class="text-slate-500 italic">Lernen, spielen und Fortschritt speichern</p>
        </div>

        <div id="setup-card" class="bg-white shadow-xl rounded-2xl p-8 mb-6 border border-slate-200">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Gemini API Key</label>
                    <input type="password" id="api-key" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="AIza...">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Anzahl der Fragen</label>
                        <input type="number" id="question-count" min="1" max="20" value="5" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="flex flex-col justify-end">
                        <div class="border-2 border-dashed border-slate-200 rounded-lg p-2 text-center hover:border-blue-400 transition cursor-pointer bg-slate-50" onclick="document.getElementById('pdf-file').click()">
                            <input type="file" id="pdf-file" accept="application/pdf" class="hidden">
                            <span class="text-xs text-slate-600 font-medium" id="file-name">PDF auswählen</span>
                        </div>
                    </div>
                </div>

                <button onclick="startQuizGeneration()" id="gen-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg">
                    Quiz generieren
                </button>
            </div>
        </div>

        <div id="status" class="hidden text-center p-10 bg-white rounded-2xl shadow-md border border-slate-100">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-blue-600 mb-4"></div>
            <p id="status-text" class="text-slate-700 font-medium mb-2 font-mono text-sm text-blue-600">Initialisierung...</p>
        </div>

        <div id="quiz-container" class="hidden bg-white shadow-2xl rounded-2xl p-8 border border-slate-200 overflow-hidden">
            <div class="w-full bg-slate-100 rounded-full h-2 mb-6">
                <div id="progress-bar" class="bg-blue-600 h-2 rounded-full" style="width: 0%"></div>
            </div>

            <div id="quiz-content">
                <div class="flex justify-between items-center mb-6">
                    <span id="q-count" class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full uppercase">Frage 1</span>
                    <span id="active-model-badge" class="text-slate-400 text-[10px] font-mono"></span>
                </div>
                <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-8 leading-snug text-center"></h2>
                <div id="options" class="space-y-3"></div>
            </div>

            <div id="game-screen" class="hidden text-center py-4">
                <h2 class="text-2xl font-bold text-blue-600 mb-2">Spielpause! 🎮</h2>
                <p class="text-slate-500 mb-4 text-sm">Zerplatze 10 Blasen, um fortzufahren!</p>
                <div class="relative inline-block">
                    <canvas id="game-canvas" width="300" height="300"></canvas>
                    <div id="game-score" class="absolute top-2 right-4 font-bold text-blue-500 text-xl font-mono">0 / 10</div>
                </div>
            </div>

            <div id="result-screen" class="hidden text-center py-6">
                <div class="text-6xl mb-4">🏆</div>
                <h2 class="text-3xl font-bold text-slate-800">Ergebnis</h2>
                <p id="score-display" class="text-xl text-slate-600 mt-2 mb-4"></p>
                
                <div id="mistake-analysis" class="mb-8"></div>

                <div class="flex flex-col gap-3">
                    <button onclick="exportQuestionsCSV()" class="text-blue-600 hover:text-blue-800 font-semibold flex items-center justify-center gap-2 border border-blue-200 py-2 rounded-lg">
                        <span>📥</span> Als CSV exportieren (Excel/Anki)
                    </button>
                    <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Neues Quiz</button>
                </div>
            </div>
        </div>

        <div id="history-container" class="mt-12">
            <h3 class="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                <span>📊</span> Deine Lernhistorie
            </h3>
            <div id="history-list" class="space-y-3">
                <p class="text-slate-400 italic text-sm text-center py-4 bg-white rounded-xl border border-dashed border-slate-200">Noch keine Daten vorhanden.</p>
            </div>
            <button onclick="clearHistory()" class="mt-4 text-xs text-red-400 hover:text-red-600 underline">Historie löschen</button>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentIndex = 0;
        let score = 0;
        let gamePoints = 0;
        let gameActive = false;
        let userMistakes = [];

        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_key');
            if(savedKey) document.getElementById('api-key').value = savedKey;
            renderHistory();
        };

        document.getElementById('pdf-file').onchange = (e) => {
            if(e.target.files.length > 0) document.getElementById('file-name').innerText = e.target.files[0].name;
        };

        async function startQuizGeneration() {
            const key = document.getElementById('api-key').value.trim();
            const file = document.getElementById('pdf-file').files[0];
            const count = document.getElementById('question-count').value;
            
            if(!key || !file) return alert("Bitte API Key eingeben und PDF auswählen!");
            
            localStorage.setItem('gemini_key', key);
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('status').classList.remove('hidden');
            
            runAiFlow(key, file, count);
        }

        async function runAiFlow(key, file, count) {
            const statusText = document.getElementById('status-text');
            try {
                statusText.innerText = "Modelle werden geprüft...";
                const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const modelsData = await modelsRes.json();
                if(modelsData.error) throw new Error(modelsData.error.message);

                const availableModels = modelsData.models.map(m => m.name);
                let chosenModelPath = availableModels.find(m => m.includes("gemini-1.5-flash")) || availableModels.find(m => m.includes("pro"));

                document.getElementById('active-model-badge').innerText = chosenModelPath.split('/').pop();

                statusText.innerText = "PDF wird analysiert...";
                const base64Data = await toBase64(file);
                
                statusText.innerText = `KI generiert ${count} Fragen...`;
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${chosenModelPath}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: `Erstelle aus dem PDF exakt ${count} Multiple-Choice-Fragen auf Deutsch. Antworte NUR als JSON-Array ohne Markdown-Formatierung: [{"question":"?","options":["A","B","C","D"],"answer":0}].` },
                                { inlineData: { mimeType: "application/pdf", data: base64Data.split(',')[1] } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                let rawText = data.candidates[0].content.parts[0].text;
                quizData = JSON.parse(rawText.replace(/```json|```/g, "").trim());
                
                document.getElementById('status').classList.add('hidden');
                document.getElementById('quiz-container').classList.remove('hidden');
                showQuestion();

            } catch (err) {
                alert("Fehler: " + err.message);
                location.reload();
            }
        }

        function showQuestion() {
            // Minispiel Trigger (bei der Hälfte der Fragen)
            const triggerIndex = Math.floor(quizData.length / 2);
            if (currentIndex === triggerIndex && gamePoints < 10 && quizData.length > 2) {
                startMiniGame();
                return;
            }

            const q = quizData[currentIndex];
            const progress = (currentIndex / quizData.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('q-count').innerText = `Frage ${currentIndex + 1} / ${quizData.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            const optContainer = document.getElementById('options');
            optContainer.innerHTML = '';

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-blue-500 hover:bg-blue-50 transition-all font-medium text-slate-700";
                btn.innerText = opt;
                btn.onclick = () => { 
                    if(i === q.answer) {
                        score++;
                    } else {
                        userMistakes.push({
                            question: q.question,
                            given: opt,
                            correct: q.options[q.answer]
                        });
                    }
                    currentIndex++; 
                    (currentIndex < quizData.length) ? showQuestion() : showResults(); 
                };
                optContainer.appendChild(btn);
            });
        }

        function startMiniGame() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            gameActive = true;
            let bubble = { x: 150, y: 150, r: 25 };

            canvas.onclick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const dist = Math.sqrt((mx - bubble.x)**2 + (my - bubble.y)**2);
                
                if(dist < bubble.r) {
                    gamePoints++;
                    document.getElementById('game-score').innerText = `${gamePoints} / 10`;
                    bubble.x = Math.random() * (canvas.width - 50) + 25;
                    bubble.y = Math.random() * (canvas.height - 50) + 25;
                    if(gamePoints >= 10) {
                        gameActive = false;
                        document.getElementById('game-screen').classList.add('hidden');
                        document.getElementById('quiz-content').classList.remove('hidden');
                        showQuestion();
                    }
                }
            };

            function draw() {
                if(!gameActive) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.beginPath();
                ctx.arc(bubble.x, bubble.y, bubble.r, 0, Math.PI * 2);
                ctx.fillStyle = '#3b82f6';
                ctx.fill();
                ctx.closePath();
                requestAnimationFrame(draw);
            }
            draw();
        }

        function showResults() {
            document.getElementById('progress-bar').style.width = `100%`;
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-display').innerText = `${score} von ${quizData.length} Punkten!`;
            
            // Fehler-Analyse
            const analysis = document.getElementById('mistake-analysis');
            if(userMistakes.length > 0) {
                analysis.innerHTML = `<div class="text-left bg-red-50 p-4 rounded-xl border border-red-100">
                    <h3 class="font-bold text-red-700 mb-2 underline">Revidierte Fehler:</h3>
                    ${userMistakes.map(m => `
                        <div class="mb-3 text-sm border-b border-red-100 pb-2">
                            <p class="font-bold text-slate-800">${m.question}</p>
                            <p class="text-red-500">Deine Antwort: ${m.given}</p>
                            <p class="text-green-600 font-medium">Korrekt: ${m.correct}</p>
                        </div>
                    `).join('')}
                </div>`;
            }

            saveResultToHistory(score, quizData.length);
        }

        function saveResultToHistory(score, total) {
            const history = JSON.parse(localStorage.getItem('quiz_history') || '[]');
            const newEntry = {
                date: new Date().toLocaleString('de-DE'),
                score: score,
                total: total,
                percent: Math.round((score / total) * 100)
            };
            history.unshift(newEntry);
            localStorage.setItem('quiz_history', JSON.stringify(history.slice(0, 10)));
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('quiz_history') || '[]');
            const container = document.getElementById('history-list');
            if (history.length === 0) return;

            container.innerHTML = history.map(entry => `
                <div class="history-card bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase font-bold">${entry.date}</p>
                        <p class="font-bold text-slate-700">${entry.percent}% korrekt</p>
                    </div>
                    <div class="text-lg font-mono font-bold ${entry.percent >= 80 ? 'text-green-500' : 'text-blue-500'}">
                        ${entry.score}/${entry.total}
                    </div>
                </div>
            `).join('');
        }

        function exportQuestionsCSV() {
            let csvContent = "Frage;Option A;Option B;Option C;Option D;Korrekte Antwort Index;Korrekte Antwort Text\n";
            quizData.forEach((q) => {
                const cleanQuestion = q.question.replace(/;/g, ",");
                const cleanOptions = q.options.map(opt => opt.replace(/;/g, ","));
                const row = [cleanQuestion, ...cleanOptions, q.answer, cleanOptions[q.answer]].join(";");
                csvContent += row + "\n";
            });
            const universalBOM = "\uFEFF";
            const blob = new Blob([universalBOM + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Quiz_Export_${new Date().getTime()}.csv`;
            a.click();
        }

        function clearHistory() {
            if(confirm("Historie wirklich löschen?")) {
                localStorage.removeItem('quiz_history');
                location.reload();
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = e => reject(e);
        });
    </script>
</body>
</html>
