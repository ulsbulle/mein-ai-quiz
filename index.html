<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-4 text-center">🧠 PDF Quiz Maker</h1>
        
        <div id="setup-section" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Gemini API Key</label>
                <input type="password" id="api-key" class="w-full p-2 border rounded mt-1" placeholder="Dein API Key hier...">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">PDF hochladen</label>
                <input type="file" id="pdf-upload" accept="application/pdf" class="w-full p-2 border rounded mt-1">
            </div>
            <button onclick="startProcessing()" id="start-btn" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">Fragen generieren</button>
        </div>

        <div id="loading" class="hidden text-center py-10">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto"></div>
            <p class="mt-4 text-gray-600">KI analysiert PDF...</p>
        </div>

        <div id="quiz-section" class="hidden">
            <div id="question-container" class="space-y-4">
                <div class="flex justify-between text-sm text-gray-500 mb-2">
                    <span id="progress">Frage 1 von 5</span>
                </div>
                <h2 id="question-text" class="text-lg font-semibold text-gray-800"></h2>
                <div id="options-container" class="grid gap-2">
                    </div>
            </div>
            <div id="result-screen" class="hidden text-center">
                <h2 class="text-2xl font-bold mb-2">Abgeschlossen!</h2>
                <p id="score-text" class="text-lg mb-4"></p>
                <button onclick="location.reload()" class="bg-gray-200 px-4 py-2 rounded">Neustart</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;

        window.startProcessing = async () => {
            const apiKey = document.getElementById('api-key').value;
            const fileInput = document.getElementById('pdf-upload');
            
            if (!apiKey || !fileInput.files[0]) {
                alert("Bitte API Key eingeben und PDF auswählen!");
                return;
            }

            toggleSection('setup-section', false);
            toggleSection('loading', true);

            try {
                const base64File = await toBase64(fileInput.files[0]);
                const genAI = new GoogleGenerativeAI(apiKey);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                const prompt = "Analysiere dieses PDF und erstelle 5 Multiple-Choice-Fragen auf Deutsch. Antworte AUSSCHLIESSLICH im JSON-Format als Array: [{'question': '...', 'options': ['A', 'B', 'C', 'D'], 'answer': index_of_correct_option}].";

                const result = await model.generateContent([
                    prompt,
                    { inlineData: { data: base64File.split(',')[1], mimeType: "application/pdf" } }
                ]);

                const responseText = result.response.text().replace(/```json|```/g, "");
                quizData = JSON.parse(responseText);
                
                showQuestion();
                toggleSection('loading', false);
                toggleSection('quiz-section', true);
            } catch (error) {
                alert("Fehler: " + error.message);
                location.reload();
            }
        };

        function showQuestion() {
            const q = quizData[currentQuestionIndex];
            document.getElementById('progress').innerText = `Frage ${currentQuestionIndex + 1} von ${quizData.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 border rounded hover:bg-blue-50 transition border-gray-300";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            if (selected === quizData[currentQuestionIndex].answer) score++;
            
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('question-container').classList.add('hidden');
            const res = document.getElementById('result-screen');
            res.classList.remove('hidden');
            document.getElementById('score-text').innerText = `Du hast ${score} von ${quizData.length} richtig beantwortet.`;
        }

        function toggleSection(id, show) {
            document.getElementById(id).classList.toggle('hidden', !show);
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    </script>
</body>
</html>
