<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI PDF Quiz Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-2xl mx-auto py-10 px-4">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2">🧠 PDF Quiz Master</h1>
            <p class="text-slate-600">Lade ein PDF hoch und lass die KI Fragen generieren.</p>
        </div>

        <div id="setup-card" class="bg-white shadow-xl rounded-2xl p-8 mb-6 border border-slate-200">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Kostenloser Gemini API Key</label>
                    <input type="password" id="api-key" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="AIza...">
                    <p class="text-[10px] text-slate-400 mt-1 italic italic">Dein Key wird nur lokal im Browser gespeichert.</p>
                </div>
                
                <div class="border-2 border-dashed border-slate-200 rounded-xl p-6 text-center hover:border-blue-400 transition cursor-pointer" onclick="document.getElementById('pdf-file').click()">
                    <input type="file" id="pdf-file" accept="application/pdf" class="hidden">
                    <span class="text-slate-500" id="file-name">Klicke hier, um ein PDF zu wählen</span>
                </div>

                <button onclick="generateQuiz()" id="gen-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-200">
                    Quiz kostenlos generieren
                </button>
            </div>
        </div>

        <div id="status" class="hidden text-center p-6">
            <div class="animate-bounce text-4xl mb-4">🤖</div>
            <p id="status-text" class="text-slate-700 font-medium italic"></p>
        </div>

        <div id="quiz-container" class="hidden bg-white shadow-xl rounded-2xl p-8 border border-slate-200">
            <div id="quiz-content">
                <div class="flex justify-between items-center mb-6">
                    <span id="q-count" class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full text-uppercase">Frage 1 / 5</span>
                    <span id="timer" class="text-slate-400 text-xs">AI Generated</span>
                </div>
                <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-6 leading-tight"></h2>
                <div id="options" class="space-y-3"></div>
            </div>

            <div id="result-screen" class="hidden text-center py-6">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-3xl font-bold text-slate-800">Fertig!</h2>
                <p id="score" class="text-xl text-slate-600 mt-2 mb-8"></p>
                <button onclick="location.reload()" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-slate-700 transition">Nochmal versuchen</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentIndex = 0;
        let score = 0;

        // Key beim Laden wiederherstellen
        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_key');
            if(savedKey) document.getElementById('api-key').value = savedKey;
        };

        // UI Updates für File Input
        document.getElementById('pdf-file').onchange = (e) => {
            document.getElementById('file-name').innerText = e.target.files[0].name;
        };

        async function generateQuiz() {
            const key = document.getElementById('api-key').value.trim();
            const file = document.getElementById('pdf-file').files[0];

            if(!key || !file) return alert("Key und PDF werden benötigt!");
            
            // Key speichern
            localStorage.setItem('gemini_key', key);

            // UI umschalten
            document.getElementById('setup-card').classList.add('hidden');
            const statusDiv = document.getElementById('status');
            statusDiv.classList.remove('hidden');
            const statusText = document.getElementById('status-text');

            try {
                statusText.innerText = "Lese PDF Dokument...";
                const base64 = await toBase64(file);
                
                statusText.innerText = "KI analysiert und erstellt Fragen...";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                {text: "Erstelle aus dem PDF exakt 5 Multiple-Choice-Fragen auf Deutsch. Antworte NUR als JSON-Array: [{'question':'Frage?','options':['A','B','C','D'],'answer':0}]. Die 'answer' ist der Index der richtigen Option (0-3)."},
                                {inlineData: {mimeType: "application/pdf", data: base64.split(',')[1]}}
                            ]
                        }]
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const rawText = data.candidates[0].content.parts[0].text;
                quizData = JSON.parse(rawText.replace(/```json|```/g, ""));
                
                statusDiv.classList.add('hidden');
                document.getElementById('quiz-container').classList.remove('hidden');
                showQuestion();

            } catch (err) {
                alert("Fehler: " + err.message);
                location.reload();
            }
        }

        function showQuestion() {
            const q = quizData[currentIndex];
            document.getElementById('q-count').innerText = `Frage ${currentIndex + 1} / ${quizData.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            const optContainer = document.getElementById('options');
            optContainer.innerHTML = '';

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-blue-500 hover:bg-blue-50 transition font-medium text-slate-700";
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(i);
                optContainer.appendChild(btn);
            });
        }

        function handleAnswer(idx) {
            if(idx === quizData[currentIndex].answer) score++;
            
            currentIndex++;
            if(currentIndex < quizData.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score').innerText = `Du hast ${score} von ${quizData.length} Fragen richtig beantwortet!`;
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    </script>
</body>
</html>
