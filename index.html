<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Master - Debug Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #progress-bar { transition: width 0.4s ease-in-out; }
        #game-canvas { cursor: crosshair; background: #f1f5f9; border-radius: 1rem; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-2xl mx-auto py-10 px-4">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-2">🧠 PDF Quiz Master</h1>
            <p class="text-slate-500 italic">Version mit Live-Fehlerdiagnose</p>
        </div>

        <div id="setup-card" class="bg-white shadow-xl rounded-2xl p-8 mb-6 border border-slate-200">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Gemini API Key</label>
                    <input type="password" id="api-key" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="AIza...">
                </div>
                
                <div class="border-2 border-dashed border-slate-200 rounded-xl p-8 text-center hover:border-blue-400 transition cursor-pointer bg-slate-50" id="drop-zone">
                    <input type="file" id="pdf-file" accept="application/pdf" class="hidden">
                    <div class="text-3xl mb-2">📄</div>
                    <span class="text-slate-600 font-medium" id="file-name">PDF hier klicken zum Auswählen</span>
                </div>

                <button onclick="startFlow()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg" id="gen-btn">
                    Quiz generieren
                </button>
            </div>
        </div>

        <div id="error-log" class="hidden mt-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 text-xs font-mono overflow-x-auto">
            <strong>Technischer Fehler:</strong> <span id="error-msg"></span>
        </div>

        <div id="status" class="hidden text-center p-10 bg-white rounded-2xl shadow-md border border-slate-100">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-blue-600 mb-4 mx-auto"></div>
            <p id="status-text" class="text-slate-700 font-medium mb-2 font-mono italic">Initialisiere...</p>
            <p id="retry-timer" class="text-red-500 font-bold hidden"></p>
        </div>

        <div id="quiz-container" class="hidden bg-white shadow-2xl rounded-2xl p-8 border border-slate-200 overflow-hidden">
            <div class="w-full bg-slate-100 rounded-full h-2 mb-6"><div id="progress-bar" class="bg-blue-600 h-2 rounded-full" style="width: 0%"></div></div>
            <div id="quiz-content">
                <div class="flex justify-between items-center mb-6"><span id="q-count" class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full uppercase">Frage 1 / 5</span></div>
                <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-8 leading-snug text-center"></h2>
                <div id="options" class="space-y-3"></div>
            </div>
            <div id="game-screen" class="hidden text-center py-4">
                <h2 class="text-2xl font-bold text-blue-600 mb-2">Spielpause! 🎮</h2>
                <canvas id="game-canvas" width="300" height="300" class="mx-auto"></canvas>
                <div id="game-score" class="font-bold text-blue-500 mt-2 text-xl">0 / 10</div>
            </div>
            <div id="result-screen" class="hidden text-center py-6">
                <h2 class="text-3xl font-bold mb-4">Ergebnis</h2>
                <p id="score-display" class="text-xl mb-8"></p>
                <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold">Neustart</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentIndex = 0;
        let score = 0;
        let gameScore = 0;

        // Key laden
        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_key');
            if(savedKey) document.getElementById('api-key').value = savedKey;
        };

        // File Selection Fix
        document.getElementById('drop-zone').onclick = () => document.getElementById('pdf-file').click();
        document.getElementById('pdf-file').onchange = (e) => {
            if(e.target.files.length > 0) document.getElementById('file-name').innerText = e.target.files[0].name;
        };

        function showError(msg) {
            const log = document.getElementById('error-log');
            log.classList.remove('hidden');
            document.getElementById('error-msg').innerText = msg;
            document.getElementById('status').classList.add('hidden');
            document.getElementById('gen-btn').disabled = false;
        }

        async function startFlow() {
            const key = document.getElementById('api-key').value.trim();
            const fileInput = document.getElementById('pdf-file');
            const file = fileInput.files[0];

            document.getElementById('error-log').classList.add('hidden');

            if(!key) return alert("API Key fehlt!");
            if(!file) return alert("Bitte wähle zuerst ein PDF aus!");

            localStorage.setItem('gemini_key', key);
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('status').classList.remove('hidden');
            
            try {
                const statusText = document.getElementById('status-text');
                
                // SCHRITT 1: Base64 Konvertierung prüfen
                statusText.innerText = "Lese PDF (Base64)...";
                const base64Data = await toBase64(file).catch(e => { throw new Error("PDF-Lesefehler: " + e); });
                
                // SCHRITT 2: API Request
                statusText.innerText = "KI wird angefragt (Gemini 1.5 Flash)...";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Erstelle 5 Multiple-Choice-Fragen auf Deutsch zum Inhalt dieses PDFs. Antworte NUR als JSON-Array ohne Markdown-Formatierung: [{'question':'?','options':['A','B','C','D'],'answer':0}]." },
                                { inlineData: { mimeType: "application/pdf", data: base64Data.split(',')[1] } }
                            ]
                        }]
                    })
                }).catch(e => { throw new Error("Netzwerkfehler: " + e.message + ". Bist du im Internet?"); });

                const data = await response.json();

                if(data.error) {
                    throw new Error(`Google API Fehler (${data.error.code}): ${data.error.message}`);
                }

                // SCHRITT 3: JSON-Parsing
                statusText.innerText = "Verarbeite KI-Antwort...";
                let rawText = data.candidates[0].content.parts[0].text;
                rawText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                
                quizData = JSON.parse(rawText);
                
                document.getElementById('status').classList.add('hidden');
                document.getElementById('quiz-container').classList.remove('hidden');
                showQuestion();

            } catch (err) {
                showError(err.message);
                console.error(err);
            }
        }

        // --- HIER DIE RESTLICHEN FUNKTIONEN (showQuestion, initMiniGame etc. wie zuvor) ---
        // (Wegen der Übersichtlichkeit hier nur die Logik-Fixes)
        
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        function showQuestion() {
            if (currentIndex === 3 && gameScore < 10) { startMiniGame(); return; }
            const q = quizData[currentIndex];
            document.getElementById('progress-bar').style.width = `${(currentIndex / quizData.length) * 100}%`;
            document.getElementById('q-count').innerText = `Frage ${currentIndex + 1} / ${quizData.length}`;
            document.getElementById('question-text').innerText = q.question;
            const optContainer = document.getElementById('options');
            optContainer.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-blue-500 hover:bg-blue-50 font-medium";
                btn.innerText = opt;
                btn.onclick = () => { if(i === q.answer) score++; currentIndex++; (currentIndex < quizData.length) ? showQuestion() : showResults(); };
                optContainer.appendChild(btn);
            });
        }

        function startMiniGame() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            let bubble = { x: 150, y: 150, r: 25 };
            
            canvas.onclick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                if(Math.sqrt((mx-bubble.x)**2 + (my-bubble.y)**2) < bubble.r) {
                    gameScore++;
                    document.getElementById('game-score').innerText = `${gameScore} / 10`;
                    bubble.x = Math.random() * 240 + 30;
                    bubble.y = Math.random() * 240 + 30;
                    if(gameScore >= 10) {
                        document.getElementById('game-screen').classList.add('hidden');
                        document.getElementById('quiz-content').classList.remove('hidden');
                        showQuestion();
                    }
                }
            };
            function draw() {
                ctx.clearRect(0,0,300,300);
                ctx.beginPath(); ctx.arc(bubble.x, bubble.y, bubble.r, 0, Math.PI*2);
                ctx.fillStyle="#3b82f6"; ctx.fill();
                if(gameScore < 10) requestAnimationFrame(draw);
            }
            draw();
        }

        function showResults() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-display').innerText = `${score} von ${quizData.length} richtig!`;
        }
    </script>
</body>
</html>
