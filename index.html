<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>AI Quiz - Hugging Face Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; }
        #error-box { color: #b91c1c; background: #fef2f2; padding: 10px; margin-top: 15px; border-radius: 6px; display: none; border: 1px solid #fee2e2; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup">
        <h2>🤗 Hugging Face Quiz</h2>
        <p style="font-size: 0.8rem; color: #666;">Nutzt Mistral-7B via Hugging Face API</p>
        <input type="password" id="hfToken" placeholder="Hugging Face Token (hf_...)">
        <input type="file" id="pdfFile" accept="application/pdf">
        <button id="startBtn" onclick="generateQuiz()">Quiz generieren</button>
        <div id="error-box"></div>
    </div>

    <div id="quiz-area" class="hidden">
        <div id="questions"></div>
        <button onclick="location.reload()" style="background:#666;">Neues PDF</button>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    async function generateQuiz() {
        const token = document.getElementById('hfToken').value.trim();
        const file = document.getElementById('pdfFile').files[0];
        const btn = document.getElementById('startBtn');
        const errBox = document.getElementById('error-box');

        if(!token || !file) return alert("Bitte Token und PDF angeben!");

        btn.disabled = true;
        btn.innerText = "KI generiert Quiz...";
        errBox.style.display = "none";

        try {
            // 1. PDF Text extrahieren
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            let text = "";
            for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ");
            }

            // 2. Hugging Face API Aufruf
            // Wir nutzen Mistral-7B-Instruct-v0.3 (sehr zuverlässig)
            const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: `[INST] Erstelle aus folgendem Text ein Quiz mit 3 Multiple-Choice-Fragen auf Deutsch. 
                    Antworte NUR mit einem JSON-Array in diesem Format: 
                    [{"q":"Frage?","a":["Option1","Option2","Option3"],"c":"Option1"}]
                    Text: ${text.substring(0, 3000)} [/INST]`,
                    parameters: { max_new_tokens: 1000, return_full_text: false }
                })
            });

            const result = await response.json();
            
            if(result.error) throw new Error(result.error);

            // Hugging Face gibt oft den Text direkt oder in einer Liste zurück
            let aiText = result[0].generated_text;
            
            // JSON säubern
            aiText = aiText.substring(aiText.indexOf('['), aiText.lastIndexOf(']') + 1);
            const quizData = JSON.parse(aiText);

            // 3. Quiz anzeigen
            showQuiz(quizData);

        } catch (e) {
            errBox.innerText = "Fehler: " + e.message;
            errBox.style.display = "block";
            btn.disabled = false;
            btn.innerText = "Erneut versuchen";
        }
    }

    function showQuiz(data) {
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('quiz-area').classList.remove('hidden');
        const container = document.getElementById('questions');
        
        container.innerHTML = data.map((q, i) => `
            <div style="margin-bottom:20px;">
                <p><strong>${q.q}</strong></p>
                ${q.a.map(opt => `<button onclick="this.style.background='${opt===q.c?'#dcfce7':'#fee2e2'}'" style="background:white; color:black; border:1px solid #ccc; margin-bottom:5px; text-align:left; font-size:0.8rem;">${opt}</button>`).join('')}
            </div>
        `).join('');
    }
</script>
</body>
</html>
